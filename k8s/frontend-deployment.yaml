apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: book-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: karayasin/k8s-frontend:2
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://192.168.10.250:30297"