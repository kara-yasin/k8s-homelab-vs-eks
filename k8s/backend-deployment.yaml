apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: book-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: karayasin/k8s-backend:2
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: "mysql"
            - name: DB_NAME
              value: "book_review_db"
            - name: DB_USER
              value: "root"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: book-review-secret
                  key: DB_PASS
            - name: DB_DIALECT
              value: "mysql"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: book-review-secret
                  key: JWT_SECRET
            - name: ALLOWED_ORIGINS
              value: "http://localhost:3000"