name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: karayasin/k8s-backend:${{ github.run_number }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: karayasin/k8s-frontend:${{ github.run_number }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Update image tags in manifests
      run: |
        sed -i 's|image: karayasin/k8s-backend:.*|image: karayasin/k8s-backend:${{ github.run_number }}|' k8s/backend-deployment.yaml
        sed -i 's|image: karayasin/k8s-frontend:.*|image: karayasin/k8s-frontend:${{ github.run_number }}|' k8s/frontend-deployment.yaml

    - name: Commit and push updated manifests
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add k8s/
        git commit -m "Update image tags to build ${{ github.run_number }}" || echo "No changes to commit"
        git push

    - name: Restart deployments on homelab
      run: echo "ArgoCD will sync automatically"